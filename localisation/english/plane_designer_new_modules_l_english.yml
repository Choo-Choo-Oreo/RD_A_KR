 remote_control_turret_system:0 "Remote Control Turret System"
 remote_control_turret_system_desc:0 "Computers in the central fire control system made corrections in three main areas to accurately aim the aircraft’s guns: ballistics, lead, and parallax. "
 remote_control_turret_system_category:0 "Remote Control Turret System" 
  
 pressurized_cockpit:0 "Pressurized cockpit" 
 pressurized_cockpit_desc:0 "Aircraft cockpit pressurization allows flying at much higher altitudes with less dense air. Thereby increasing its speed and maneuverability."  

 water_injection_small:0 "Engine injection system" 
 water_injection_small_desc:0 "Engine injection is used to cool the fuel-air mixture and thus achieve more power and lower consumption. " 
 water_injection_medium:0 "Engine injection system" 
 water_injection_medium_desc:0 "Engine injection is used to cool the fuel-air mixture and thus achieve more power and lower consumption. " 
 water_injection_large:0 "Engine injection system" 
 water_injection_large_desc:0 "Engine injection is used to cool the fuel-air mixture and thus achieve more power and lower consumption. "  

 turbocharger:0 "Turbocharger"
 turbocharger_desc:0 "A turbocharger is a turbine driven, forced induction device that is utilised in a piston engine to enable it to produce more power."
 supercharger:0 "Supercharger"
 supercharger_desc:0 "A supercharger is a mechanically driven, forced induction device that is utilised in a piston engine to enable it to produce more power. Its purpose and function is similar to a turbocharger with the principal difference being that it is mechanically driven by a direct connection to the engine whereas a turbocharger is turbine driven using engine exhaust gas flow." 

 dive_brakes_medium:0 "Dive Brakes" 
 dive_brakes_medium_desc:0 "A set of spoilers along the trailing edge of the wing deploy when the plane enters a dive, reducing overall speed and allowing the plane to pull out of steep dives without ripping its wings off. this, in turn, allows the plane to attack from a near-vertical dive, drastically increasing accuracy."
 
